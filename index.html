<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Ledger Pro - Weighing Station</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen antialiased">

    <nav class="bg-emerald-700 text-white shadow-md px-4 py-3 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-wheat-awn text-xl text-amber-400"></i>
                <span class="font-bold text-lg tracking-wide">CoffeeLedger <span class="text-amber-300">Pro</span></span>
            </div>
            <span class="bg-emerald-800 text-xs px-3 py-1 rounded-full font-mono border border-emerald-600">Station-01</span>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-6">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-6">
            <div class="border-b border-slate-100 pb-4 mb-6">
                <h1 class="text-xl font-bold text-slate-900">Cherry Intake Console</h1>
                <p class="text-xs text-slate-500 mt-1">Log daily kilograms and trigger automated member SMS alerts.</p>
            </div>

            <form id="deliveryForm" class="space-y-5">
                <div>
                    <label for="factoryNumber" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">
                        Member Factory Number
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-solid fa-id-badge"></i>
                        </span>
                        <input type="number" id="factoryNumber" placeholder="e.g. 5507" required
                            class="w-full pl-9 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition font-mono font-bold text-lg text-slate-900">
                        <span id="lookupSpinner" class="hidden absolute inset-y-0 right-0 flex items-center pr-3">
                            <i class="fa-solid fa-circle-notch animate-spin text-emerald-600"></i>
                        </span>
                    </div>
                </div>

                <div id="lookupContainer" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm flex items-center justify-between transition-all duration-200">
                    <div class="flex items-center gap-3">
                        <div id="statusIconBg" class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500">
                            <i id="statusIcon" class="fa-solid fa-user"></i>
                        </div>
                        <div>
                            <p id="ownerLabel" class="text-xs font-medium text-slate-400">Owner Verification</p>
                            <p id="ownerName" class="font-bold text-slate-700">Enter Number Above...</p>
                        </div>
                    </div>
                </div>

                <div>
                    <label for="kilosDelivered" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">
                        Measured Cherry Weight (Kgs)
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-solid fa-scale-balanced"></i>
                        </span>
                        <input type="number" step="0.1" id="kilosDelivered" placeholder="0.0" required disabled
                            class="w-full pl-9 pr-16 py-3 bg-slate-100 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition font-mono font-bold text-lg text-slate-900 disabled:opacity-60 disabled:cursor-not-allowed">
                        <span class="absolute inset-y-0 right-0 flex items-center pr-4 font-bold text-slate-400 text-sm">KG</span>
                    </div>
                </div>

                <div id="alertBox" class="hidden rounded-xl p-4 text-sm flex items-start gap-3 border transition-all">
                    <i id="alertIcon" class="mt-0.5 text-base"></i>
                    <div>
                        <p id="alertTitle" class="font-bold"></p>
                        <p id="alertMessage" class="text-xs opacity-90 mt-0.5"></p>
                    </div>
                </div>

                <button type="submit" id="submitBtn" disabled
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-emerald-600/20 transition-all duration-150 flex items-center justify-center gap-2 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span>Commit Weight Record</span>
                </button>
            </form>
        </div>
    </main>

    <script>
        const factoryInput = document.getElementById('factoryNumber');
        const kilosInput = document.getElementById('kilosDelivered');
        const submitBtn = document.getElementById('submitBtn');
        const lookupSpinner = document.getElementById('lookupSpinner');
        const lookupContainer = document.getElementById('lookupContainer');
        const ownerName = document.getElementById('ownerName');
        const ownerLabel = document.getElementById('ownerLabel');
        const statusIconBg = document.getElementById('statusIconBg');
        const statusIcon = document.getElementById('statusIcon');
        const alertBox = document.getElementById('alertBox');
        const alertIcon = document.getElementById('alertIcon');
        const alertTitle = document.getElementById('alertTitle');
        const alertMessage = document.getElementById('alertMessage');

        let typingTimer;
        const doneTypingInterval = 600; // Triggers lookup 600ms after user stops typing

        // Debounce input lookup wrapper
        factoryInput.addEventListener('input', () => {
            clearTimeout(typingTimer);
            resetValidationState();
            if (factoryInput.value) {
                typingTimer = setTimeout(performMemberLookup, doneTypingInterval);
            }
        });

        // Async Database Route Lookup Call
        async function performMemberLookup() {
            const factoryId = factoryInput.value.trim();
            if(!factoryId) return;

            lookupSpinner.classList.remove('hidden');

            try {
                // Fetch call routes straight into your Node backend API endpoint
                const response = await fetch(`/api/member/${factoryId}`);
                const data = await response.json();

                lookupSpinner.classList.add('hidden');

                if (response.ok && data.success) {
                    setValidState(data.full_name);
                } else {
                    setInvalidState(data.error || "Member Code Not Registered");
                }
            } catch (err) {
                lookupSpinner.classList.add('hidden');
                setInvalidState("Connection Timeout/Failure");
            }
        }

        function setValidState(name) {
            ownerName.textContent = name;
            ownerLabel.textContent = "Verified Farmer Name";
            lookupContainer.className = "bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-sm flex items-center justify-between";
            statusIconBg.className = "w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white";
            statusIcon.className = "fa-solid fa-user-check";
            
            kilosInput.disabled = false;
            kilosInput.classList.remove('bg-slate-100');
            submitBtn.disabled = false;
        }

        function setInvalidState(errorMessage) {
            ownerName.textContent = errorMessage;
            ownerLabel.textContent = "System Error";
            lookupContainer.className = "bg-rose-50 border border-rose-200 rounded-xl p-3 text-sm flex items-center justify-between";
            statusIconBg.className = "w-8 h-8 rounded-full bg-rose-500 flex items-center justify-center text-white";
            statusIcon.className = "fa-solid fa-user-xmark";
            
            disableInputs();
        }

        function resetValidationState() {
            ownerName.textContent = "Verifying Identity...";
            ownerLabel.textContent = "System Query";
            lookupContainer.className = "bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm flex items-center justify-between";
            statusIconBg.className = "w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500";
            statusIcon.className = "fa-solid fa-user font-normal animate-pulse";
            disableInputs();
            hideAlert();
        }

        function disableInputs() {
            kilosInput.disabled = true;
            kilosInput.value = '';
            kilosInput.classList.add('bg-slate-100');
            submitBtn.disabled = true;
        }

        function showAlert(type, title, text) {
            alertBox.className = type === 'success' 
                ? "rounded-xl p-4 text-sm flex items-start gap-3 border bg-emerald-50 border-emerald-200 text-emerald-800"
                : "rounded-xl p-4 text-sm flex items-start gap-3 border bg-rose-50 border-rose-200 text-rose-800";
            
            alertIcon.className = type === 'success' ? "fa-solid fa-circle-check" : "fa-solid fa-triangle-exclamation";
            alertTitle.textContent = title;
            alertMessage.textContent = text;
            alertBox.classList.remove('hidden');
        }

        function hideAlert() {
            alertBox.classList.add('hidden');
        }

        // Form Submit Handler to commit records
        document.getElementById('deliveryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                factory_number: parseInt(factoryInput.value),
                kilos_delivered: parseFloat(kilosInput.value)
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> Processing Ledger...`;

            try {
                const response = await fetch('/api/delivery', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (response.ok && result.success) {
                    showAlert('success', 'Transaction Successful!', 'Weight logged into server ledger. SMS delivery pipeline fired out successfully to member and management logs.');
                    factoryInput.value = '';
                    disableInputs();
                } else {
                    showAlert('error', 'Ledger Sync Failure', result.error || 'Server error occurred while committing weight.');
                    submitBtn.disabled = false;
                }
            } catch (err) {
                showAlert('error', 'Gateway Timeout', 'Could not reach server. Verify connection configurations.');
                submitBtn.disabled = false;
            } finally {
                submitBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span>Commit Weight Record</span>`;
            }
        });
    </script>
</body>
      </html>
