<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <style>
        body { font-family: sans-serif; background-color: #f9f9f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .box { max-width: 400px; width: 100%; background: #fff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .banner { background: #6d1b7b; color: white; text-align: center; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #9c27b0; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .loading { display: none; text-align: center; color: #1e6091; font-weight: bold; margin: 20px 0; }
        iframe { width: 100%; height: 500px; border: 1px solid #ddd; border-radius: 8px; display: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="box">
    <div class="banner">
        <h2>KSh 100.00</h2>
        <p>Premium Upgrade via PesaPal</p>
    </div>

    <div id="formView">
        <form id="paymentForm">
            <label>First Name</label>
            <input type="text" id="firstName" placeholder="e.g. John" required>
            
            <label>Last Name</label>
            <input type="text" id="lastName" placeholder="e.g. Doe" required>
            
            <label>Phone Number</label>
            <input type="text" id="phoneNumber" placeholder="e.g. 07XXXXXXXX" required>
            
            <button type="submit">Pay KSh 100 via PesaPal</button>
        </form>
    </div>

    <div id="loadingStatus" class="loading">Secure PesaPal checkout loading...</div>
    <iframe id="pesapalFrame"></iframe>
</div>

<script>
    document.getElementById('paymentForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const phoneNumber = document.getElementById('phoneNumber').value;

        // UI View State Shifts
        document.getElementById('formView').style.display = 'none';
        document.getElementById('loadingStatus').style.display = 'block';

        try {
            const response = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ firstName, lastName, phoneNumber })
            });
            const data = await response.json();

            if (data.success && data.redirect_url) {
                document.getElementById('loadingStatus').style.display = 'none';
                const frame = document.getElementById('pesapalFrame');
                frame.src = data.redirect_url;
                frame.style.display = 'block';
            } else {
                alert('Checkout setup failed.');
                location.reload();
            }
        } catch (err) {
            alert('Communication breakdown error.');
            location.reload();
        }
    });
</script>

</body>
</html>
